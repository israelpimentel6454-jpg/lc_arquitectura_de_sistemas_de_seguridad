          # TODO: ejecuta la auditoría sobre app/requirements.txt


  # ═══════════════════════════════════════════════════════════════════════════
  # ETAPA 3 — TESTS
  # Herramienta: pytest — ejecuta las pruebas unitarias del proyecto.
  # Esta etapa corre DESPUÉS de las etapas anteriores (ver "needs").
  # ═══════════════════════════════════════════════════════════════════════════

  tests:
    name: Unit Tests - Pytest
    runs-on: ubuntu-latest
    needs: [sast, sca]

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/requirements.txt
          pip install pytest

      - name: Ejecutar tests
        run: pytest Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/tests/ -v

  # ═══════════════════════════════════════════════════════════════════════════
  # Resumen del Pipeline
  # ═══════════════════════════════════════════════════════════════════════════
  pipeline-status:
    name: Estatus Final
    runs-on: ubuntu-latest
    needs: [sast, sca, tests]
    if: always() 
    steps:
      - name: Check Status
        run: |
          echo "¡El ciclo de DevSecOps ha terminado su ejecución!"
 
