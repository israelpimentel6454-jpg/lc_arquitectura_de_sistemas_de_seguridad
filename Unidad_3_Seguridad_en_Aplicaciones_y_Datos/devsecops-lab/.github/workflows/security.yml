# Archivo: .github/workflows/security.yml
# Lab DevSecOps — Arquitectura de Sistemas de Seguridad CUGDL — Semana 9

name: Pipeline de Seguridad DevSecOps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # ETAPA 1 — SAST (Static Application Security Testing)
  # ═══════════════════════════════════════════════════════════════════════════
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Semgrep
        run: pip install semgrep

      # TODO ▼ ─────────────────────────────────────────────────────────────
      # Paso 3: ejecutar el análisis de Semgrep.
      - name: Ejecutar análisis SAST
        run: |
          semgrep --config p/python --config p/owasp-top-ten --config p/secrets --config p/sql-injection --error --json --output=semgrep-results.json lc_arquitectura_de_sistemas_de_seguridad/Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/ || true

      - name: Guardar resultados SAST
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  # ═══════════════════════════════════════════════════════════════════════════
  # ETAPA 2 — SCA (Software Composition Analysis)
  # ═══════════════════════════════════════════════════════════════════════════
  sca:
    name: SCA - pip-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # TODO ▼ ─────────────────────────────────────────────────────────────
      # Paso 3: instalar pip-audit y ejecutar la auditoría.
      - name: Instalar y ejecutar pip-audit
        run: |
          pip install pip-audit
          pip-audit -r lc_arquitectura_de_sistemas_de_seguridad/Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/requirements.txt --format=json --output=audit-report.json || true
          echo '--- Reporte de CVEs encontrados ---'
          pip-audit -r lc_arquitectura_de_sistemas_de_seguridad/Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/requirements.txt || true

      - name: Guardar reporte de auditoria
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: audit-report.json

  # ═══════════════════════════════════════════════════════════════════════════
  # ETAPA 3 — TESTS
  # ═══════════════════════════════════════════════════════════════════════════
  tests:
    name: Unit Tests - Pytest
    runs-on: ubuntu-latest
    needs: [sast, sca]

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r lc_arquitectura_de_sistemas_de_seguridad/Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/requirements.txt
          pip install pytest

      - name: Ejecutar tests
        run: pytest lc_arquitectura_de_sistemas_de_seguridad/Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/tests/ -v

  # ═══════════════════════════════════════════════════════════════════════════
  # Resumen del Pipeline
  # ═══════════════════════════════════════════════════════════════════════════
  pipeline-status:
    name: Estatus Final
    runs-on: ubuntu-latest
    needs: [sast, sca, tests]
    if: always() 
    steps:
      - name: Check Status
        run: |
          echo "SAST: ${{ needs.sast.result }}"
          echo "SCA: ${{ needs.sca.result }}"
          echo "Tests: ${{ needs.tests.result }}"
          echo "¡El ciclo de DevSecOps ha terminado su ejecución!"
