name: Pipeline de Seguridad DevSecOps

# ─── DISPARADORES ────────────────────────────────────────────────────────────
# Este bloque ya está completo. Define cuándo se ejecuta el pipeline.
# ¿Por qué se incluye pull_request y no solo push?
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ─── TRABAJOS (JOBS) ─────────────────────────────────────────────────────────
# Cada job es una etapa independiente del pipeline.
# Los jobs corren en paralelo por defecto, salvo que uses "needs:".

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # ETAPA 1 — SAST (Static Application Security Testing)
  # Herramienta: Semgrep — analiza el código fuente en busca de patrones
  # vulnerables sin ejecutar la aplicación.
  # ═══════════════════════════════════════════════════════════════════════════
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest

    steps:
      # Paso 1: descargar el código del repositorio al runner.
      # Esta action es estándar en casi todo workflow de GitHub Actions.
     
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Semgrep
        run: pip install semgrep

      - name: Ejecutar análisis SAST
        run: |
          semgrep --config p/python --config p/owasp-top-ten --config p/secrets --config p/sql-injection --error --json --output=semgrep-results.json app/ || true
          
      - name: Guardar resultados SAST
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json
        

      # Paso 2: instalar Semgrep en el runner.
      # Semgrep es un paquete de Python, se instala con pip.
      - name: Instalar Semgrep
        run: pip install semgrep

